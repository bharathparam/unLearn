# pytest.ini — pytest configuration for ROME-2

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show test duration; fail fast on first error with -x flag
addopts = -v --tb=short

# Asyncio mode (for any future async tests)
asyncio_mode = auto

# Filter out known noisy warnings from PyTorch / transformers
filterwarnings =
    ignore::UserWarning:torch
    ignore::FutureWarning:transformers
    ignore::DeprecationWarning
